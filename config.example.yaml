crawl:
  root_path: "."          # Directory to crawl — set to your project root
  batch_size: 100
  skip_hidden: true
  skip_dirs:
    - "node_modules"
    - "__pycache__"
    - ".venv"
    - "venv"
    - "dist"
    - "build"
    - ".git"
    - ".idea"
    - ".vscode"
    - "coverage"
    - ".pytest_cache"
    - ".mypy_cache"
    - ".cache"
  text_sample_max_chars: 4000
  hash_bytes: 65536

# LLM provider configuration — choose ONE:

# Option A: Local Ollama (default, free, private)
ollama:
  endpoint: "http://localhost:11434"
  model: "mistral:7b"       # Any Ollama model — smaller models are faster
  timeout: 120
  # Semantic search (optional) — omit or set to null to disable embedding entirely
  embedding_model: "nomic-embed-text"  # Ollama embedding model; enables RAG semantic search
  embedding_endpoint: null             # Separate Ollama instance for embeddings (defaults to endpoint above)
                                       # Useful when chat uses a remote proxy but embeddings run locally

# Option B: OpenAI-compatible API (faster, costs money)
# Uncomment and set your API key in .env (OPENAI_API_KEY=sk-...)
# openai:
#   base_url: "https://api.openai.com/v1"   # Or any compatible endpoint
#   model: "gpt-4o-mini"
#   api_key_env: "OPENAI_API_KEY"            # Environment variable name
#   timeout: 60

catalog:
  db_path: "share_scout.db"

web:
  host: "0.0.0.0"
  port: 8080
