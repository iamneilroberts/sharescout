<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShareScout{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        // Apply saved theme before render to prevent flash
        (function() {
            var theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <nav>
        <div class="container">
            <span class="brand">ShareScout</span>
            <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">Dashboard</a>
            <a href="{{ url_for('browse') }}" class="{{ 'active' if request.endpoint == 'browse' }}">Browse</a>
            <a href="{{ url_for('search') }}" class="{{ 'active' if request.endpoint == 'search' }}">Search</a>
            <a href="{{ url_for('compare') }}" class="{{ 'active' if request.endpoint == 'compare' }}">Compare</a>
            <a href="{{ url_for('tags') }}" class="{{ 'active' if request.endpoint == 'tags' }}">Tags</a>
            <a href="{{ url_for('timeline') }}" class="{{ 'active' if request.endpoint == 'timeline' }}">Timeline</a>
            <a href="{{ url_for('insights') }}" class="{{ 'active' if request.endpoint == 'insights' }}">Insights</a>
            <span id="nav-crawl-status" style="font-size: 0.75rem; color: #adb5bd; margin-left: auto;"></span>
            <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark theme">Light</button>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        (function() {
            var btn = document.getElementById('theme-toggle');
            var current = localStorage.getItem('theme') || 'dark';
            btn.textContent = current === 'dark' ? 'Light' : 'Dark';
            btn.addEventListener('click', function() {
                current = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', current);
                localStorage.setItem('theme', current);
                btn.textContent = current === 'dark' ? 'Light' : 'Dark';
            });
        })();

        // Nav crawl status polling
        (function() {
            var el = document.getElementById('nav-crawl-status');
            function update() {
                fetch('/crawl/status')
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        if (d.running) {
                            el.innerHTML = '<span style="color: #51cf66;">&#9679;</span> Crawling: ' +
                                d.analyzed + ' analyzed, ' + d.extracted + ' extracted' +
                                (d.per_minute > 0 ? ' (' + d.per_minute + '/min)' : '');
                        } else {
                            el.innerHTML = '<span style="color: #6c757d;">&#9679;</span> ' + d.analyzed + ' analyzed';
                        }
                    })
                    .catch(function() { el.textContent = ''; });
            }
            update();
            setInterval(update, 10000);
        })();
    </script>
</body>
</html>
