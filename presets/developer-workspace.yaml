name: developer-workspace
description: "Optimized for developer project collections — READMEs, specs, architecture docs, code"

scoring_rules:
  extensions:
    - extensions: [".md", ".mdx", ".rst", ".adoc"]
      score: 55
    - extensions: [".txt"]
      score: 30
    - extensions: [".yaml", ".yml", ".toml"]
      score: 25
    - extensions: [".py", ".ts", ".tsx", ".js", ".jsx"]
      score: 15
    - extensions: [".go", ".rs", ".rb", ".java", ".cs", ".c", ".cpp"]
      score: 10
    - extensions: [".sql"]
      score: 20
    - extensions: [".json"]
      score: 5
    - extensions: [".docx", ".pdf"]
      score: 35
    - extensions: [".html", ".htm"]
      score: 15
  path_rules:
    - pattern: "*README*"
      score: 20
    - pattern: "*CLAUDE.md"
      score: 25
    - pattern: "*CHANGELOG*"
      score: 15
    - pattern: "*/docs/*"
      score: 20
    - pattern: "*/features/*"
      score: 25
    - pattern: "*/specs/*"
      score: 20
    - pattern: "*/summaries/*"
      score: 15
    - pattern: "*/.project/*"
      score: 15
    - pattern: "*/migrations/*"
      score: -10
    - pattern: "*/test_data/*"
      score: -15
    - pattern: "*/fixtures/*"
      score: -15
  score_threshold: 30

prompts: {}

extraction:
  xlsx_max_rows_per_sheet: 50
  pptx_max_slides: 20

analysis:
  summary_sentences_short: "2-5 sentences"
  summary_sentences_medium: "5-10 sentences"
  summary_sentences_long: "15-25 sentences"
  max_chunks: 10

llm:
  vision_model: null
  vision_provider: "ollama"

skip_dirs: []

categories:
  - "Feature Spec"
  - "Architecture"
  - "README/Setup"
  - "API/Integration"
  - "Database"
  - "Configuration"
  - "Session Handoff"
  - "Testing"
  - "Deployment"
  - "User Guide"
  - "Development Journal"
  - "Code"
  - "Data"
  - "Other"
